<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Arena</title>
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' https://cdnjs.cloudflare.com;
  style-src 'self' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  connect-src 'self'
    https://api.anthropic.com
    https://api.openai.com
    https://generativelanguage.googleapis.com;
  img-src 'self' data:;
  object-src 'none';
">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="header">
    <h1 class="header__title">AI Arena</h1>
    <p class="header__status" id="statusIndicator" aria-live="polite"></p>
    <div class="header__actions">
      <button type="button" class="btn btn--icon" id="settingsBtn">設定</button>
    </div>
  </header>

  <section class="controls glass-panel">
    <div class="controls__providers">

      <div class="provider-control" data-provider="claude">
        <label class="provider-control__toggle">
          <input type="checkbox" id="claude-enabled" checked>
          <span class="provider-control__name">Claude</span>
        </label>
        <select id="claude-model" class="select">
          <option value="claude-opus-4-8">Opus 4.8</option>
          <option value="claude-sonnet-5" selected>Sonnet 5</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
      </div>

      <div class="provider-control" data-provider="gpt">
        <label class="provider-control__toggle">
          <input type="checkbox" id="gpt-enabled" checked>
          <span class="provider-control__name">GPT</span>
        </label>
        <select id="gpt-model" class="select"></select>
      </div>

      <div class="provider-control" data-provider="gemini">
        <label class="provider-control__toggle">
          <input type="checkbox" id="gemini-enabled" checked>
          <span class="provider-control__name">Gemini</span>
        </label>
        <select id="gemini-model" class="select">
          <option value="gemini-3.5-flash" selected>3.5 Flash</option>
          <option value="gemini-3.1-pro-preview">3.1 Pro</option>
        </select>
      </div>

    </div>

    <div class="controls__pdf" id="pdfDropzone">
      <button type="button" class="btn" id="pdfUploadBtn">📎 上傳 PDF</button>
      <input type="file" id="pdfInput" accept="application/pdf" hidden>
      <div class="pdf-tag" id="pdfTag" hidden>
        <span class="pdf-tag__name" id="pdfFileName"></span>
        <button type="button" class="btn btn--tiny" id="pdfRemoveBtn" aria-label="移除檔案">✕</button>
      </div>
    </div>

    <div class="controls__quick-prompts">
      <button type="button" class="btn btn--quick" data-prompt="summary">摘要</button>
      <button type="button" class="btn btn--quick" data-prompt="keywords">關鍵字</button>
      <button type="button" class="btn btn--quick" data-prompt="outline">目錄</button>
      <button type="button" class="btn btn--quick" data-prompt="faq">FAQ</button>
    </div>
  </section>

  <main class="columns">

    <section class="column column--claude glass-panel" data-provider="claude">
      <header class="column__header">
        <span class="column__name">Claude</span>
        <span class="column__badge" id="claude-badge"></span>
        <button type="button" class="btn btn--tiny" data-action="clear" data-provider="claude">清除對話</button>
      </header>
      <div class="column__body" id="claude-messages"></div>
      <footer class="column__footer">
        <button type="button" class="btn btn--tiny" data-action="copy-column" data-provider="claude">複製此欄</button>
      </footer>
    </section>

    <section class="column column--gpt glass-panel" data-provider="gpt">
      <header class="column__header">
        <span class="column__name">GPT</span>
        <span class="column__badge" id="gpt-badge"></span>
        <button type="button" class="btn btn--tiny" data-action="clear" data-provider="gpt">清除對話</button>
      </header>
      <div class="column__body" id="gpt-messages"></div>
      <footer class="column__footer">
        <button type="button" class="btn btn--tiny" data-action="copy-column" data-provider="gpt">複製此欄</button>
      </footer>
    </section>

    <section class="column column--gemini glass-panel" data-provider="gemini">
      <header class="column__header">
        <span class="column__name">Gemini</span>
        <span class="column__badge" id="gemini-badge"></span>
        <button type="button" class="btn btn--tiny" data-action="clear" data-provider="gemini">清除對話</button>
      </header>
      <div class="column__body" id="gemini-messages"></div>
      <footer class="column__footer">
        <button type="button" class="btn btn--tiny" data-action="copy-column" data-provider="gemini">複製此欄</button>
      </footer>
    </section>

  </main>

  <footer class="input-bar glass-panel">
    <textarea id="messageInput" class="input-field" placeholder="輸入訊息…" rows="2"></textarea>
    <div class="input-bar__actions">
      <button type="button" class="btn btn--send" id="sendBtn">發送</button>
      <button type="button" class="btn btn--primary" id="downloadAllBtn">下載全部</button>
    </div>
  </footer>

  <p class="disclaimer">
    本工具直接從您的瀏覽器呼叫各家 AI API。您的 API Key 僅儲存於當前瀏覽器 Session，關閉分頁後自動清除，不經過任何第三方伺服器。上傳的文件內容會依據各家 API 政策處理，請勿上傳機密或個人敏感資料。
  </p>

</div>

<div class="modal-overlay" id="settingsModal" hidden>
  <div class="modal glass-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal__header">
      <h2 id="settingsTitle">API Key 設定</h2>
      <button type="button" class="btn btn--icon" id="settingsCloseBtn" aria-label="關閉">✕</button>
    </div>
    <div class="modal__body">

      <div class="key-row" data-provider="claude">
        <label class="key-row__label" for="claude-key">Claude API Key</label>
        <div class="key-row__input-group">
          <input type="password" id="claude-key" class="api-key-input" autocomplete="off" spellcheck="false">
          <button type="button" class="btn btn--verify" data-provider="claude">驗證</button>
        </div>
        <span class="key-status" id="claude-key-status"></span>
      </div>

      <div class="key-row" data-provider="gpt">
        <label class="key-row__label" for="gpt-key">GPT API Key</label>
        <div class="key-row__input-group">
          <input type="password" id="gpt-key" class="api-key-input" autocomplete="off" spellcheck="false">
          <button type="button" class="btn btn--verify" data-provider="gpt">驗證</button>
        </div>
        <span class="key-status" id="gpt-key-status"></span>
      </div>

      <div class="key-row" data-provider="gemini">
        <label class="key-row__label" for="gemini-key">Gemini API Key</label>
        <div class="key-row__input-group">
          <input type="password" id="gemini-key" class="api-key-input" autocomplete="off" spellcheck="false">
          <button type="button" class="btn btn--verify" data-provider="gemini">驗證</button>
        </div>
        <span class="key-status" id="gemini-key-status"></span>
      </div>

    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
